name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b3620eeebfac8534f1c3381dede11670f22cd14ac240a84088 # v4.2.2
      - uses: actions/setup-go@0c52d547c9bc32b1aa3301fb7d9d534f0291014ff15cd4c3a6743aaffac9e39d # v5.4.0
        with:
          go-version: "1.25"
          cache: true

      - name: force LF line endings (Windows-safe)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          # The Windows runner sometimes checks Go files out with CRLF even
          # with autocrlf=false, which makes gofmt fail. .gitattributes
          # enforces eol=lf, but we also re-checkout to be sure.
          git config --global core.autocrlf input
          git checkout HEAD -- .

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: gofmt
        shell: bash
        run: |
          if [ "$(gofmt -l . | wc -l)" -ne 0 ]; then
            echo "These files are not gofmt'd:"
            gofmt -l .
            exit 1
          fi

      - name: staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: go test
        run: go test -race -timeout 120s ./...

  cross:
    name: cross-build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [darwin, linux, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@11bd71901bbe5b3620eeebfac8534f1c3381dede11670f22cd14ac240a84088 # v4.2.2

      - name: force LF line endings (Windows-safe)
        shell: bash
        run: |
          git config --global core.autocrlf input
          git checkout HEAD -- .

      - uses: actions/setup-go@0c52d547c9bc32b1aa3301fb7d9d534f0291014ff15cd4c3a6743aaffac9e39d # v5.4.0
        with:
          go-version: "1.25"
          cache: true
      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          ver="$(git describe --tags --always --dirty 2>/dev/null || echo dev)"
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          out="pgflow-$GOOS-$GOARCH$ext"
          go build -ldflags="-s -w -X main.version=$ver" -o "$out" .
          # Smoke test: the binary must at least print its version.
          ./pgflow-$GOOS-$GOARCH$ext --version
          ./pgflow-$GOOS-$GOARCH$ext --help
          ls -lh "$out"